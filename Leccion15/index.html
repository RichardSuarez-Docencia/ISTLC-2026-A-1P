<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=delete,edit" />

    <link rel="stylesheet" href="style.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    
  </head>
  <body>
    <h1>Consumiendo Peticiones Http</h1>

    <div class="container text-center">
      <div class="row">
        <div class="col-7">
          <div class="tablaScroll">
            <table class="table w-100">
            <thead>
              <tr>
                <th>id</th>
                <th>Nombre</th>
                <th>Fecha Nacimiento</th>
                <th>Nacionalidad</th>
                <th>Imagen</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="bodyTabla">

            </tbody>
          </table>
          </div>
        </div>
        <div class="col-5">
          <h2>Crear Actor</h2>
           <div class="row mb-3">
             <input type="hidden" id="txtId">
              <div class="col-2">
                <label for="" class="form-label"><b>Nombre:</b></label>
              </div>
              <div class="col">
                <input type="text" class="form-control" id="txtNombre">
              </div>
           </div>

           <div class="row mb-3">
              <div class="col-2">
                <label for="" class="form-label"><b>Fecha de Nacimiento:</b></label>
              </div>
              <div class="col">
                <input type="text" class="form-control" id="txtFechaNacimiento">
              </div>
           </div>

           <div class="row mb-3">
              <div class="col-2">
                <label for="" class="form-label"><b>Nacionalidad:</b></label>
              </div>
              <div class="col">
                <input type="text" class="form-control" id="txtNacionalidad">
              </div>
           </div>

           <div class="row mb-3">
              <div class="col-2">
                <label for="" class="form-label"><b>Imagen:</b></label>
              </div>
              <div class="col">
                <input type="text" class="form-control" id="txtImagen">
              </div>
           </div>

           <div class="row mb-3">
              <button onclick="guardarActor()" class="btn btn-primary w-100">Guadar</button>
           </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
